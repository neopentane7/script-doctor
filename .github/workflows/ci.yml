name: CI

# Runs the offline test suite on every push to main and on all pull requests.
# No API keys are required: the tests never call the LLM providers or build the
# vector store — the API-dependent regression harness (eval/harness.py) is run
# manually, not in CI. Only its pure scoring logic is covered here.

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  test:
    name: Tests (offline)
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Run tests
        run: pytest -q
